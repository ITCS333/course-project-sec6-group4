<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Weekly Breakdown</title>

    <link rel="stylesheet" href="../../assets/style.css">

    <script src="admin.js" defer></script>
</head>
<body>

    <header>
        <h1>Manage Weekly Breakdown</h1>
    </header>

    <main>

        <!-- Section 1 -->
        <section>
            <h2>Add a New Week</h2>

            <form id="week-form" action="#">
                <fieldset>
                    <legend>Weekly Details</legend>

                    <label for="week-title">Week Title</label>
                    <input 
                        type="text" 
                        id="week-title" 
                        placeholder="Week 1: Introduction to HTML" 
                        required
                    >

                    <label for="week-start-date">Start Date</label>
                    <input 
                        type="date" 
                        id="week-start-date" 
                        required
                    >

                    <label for="week-description">Description</label>
                    <textarea 
                        id="week-description" 
                        rows="5">
                    </textarea>

                    <label for="week-links">Resource Links</label>
                    <textarea 
                        id="week-links" 
                        rows="3"
                        placeholder="One URL per line">
                    </textarea>

                    <button 
                        id="add-week" 
                        type="submit">
                        Add Week
                    </button>

                </fieldset>
            </form>
        </section>


        <!-- Section 2 -->
        <section>
            <h2>Current Weekly Breakdown</h2>

            <table id="weeks-table" border="1">
                <thead>
                    <tr>
                        <th>Week Title</th>
                        <th>Start Date</th>
                        <th>Description</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody id="weeks-tbody">
                    <!-- admin.js inserts rows here -->
                </tbody>

            </table>
        </section>

    </main>

</body>
</html>
