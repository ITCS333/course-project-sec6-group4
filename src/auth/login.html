<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <!-- Simple styling (you can replace with Bootstrap if needed) -->
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;
            background: #f4f4f4;
        }

        main {
            width: 100%;
        }

        section {
            background: white;
            padding: 20px;
            width: 300px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        input {
            margin-bottom: 10px;
            padding: 8px;
        }

        button {
            padding: 10px;
            cursor: pointer;
        }

        #message-container {
            margin-top: 10px;
        }
    </style>

</head>

<body>

<main>

    <section>

        <h2>Welcome Back!</h2>

        <form id="login-form" action="#">

            <fieldset>

                <legend>Secure Login</legend>

                <label for="email">Email Address</label>
                <input type="email" id="email" required>

                <label for="password">Password</label>
                <input type="password" id="password" required minlength="8">

                <button type="submit" id="login">Log In</button>

            </fieldset>

            <div id="message-container"></div>

        </form>

    </section>

</main>

<script src="login.js" defer></script>

</body>
</html>
