<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;
            background: #f4f4f4;
        }

        section {
            background: white;
            padding: 20px;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
        }

        button {
            width: 100%;
            padding: 10px;
            cursor: pointer;
        }

        #message-container {
            margin-top: 10px;
        }

        .error { color: red; }
        .success { color: green; }
    </style>
</head>

<body>

<main>
    <section>
        <h2>Login</h2>

        <form id="login-form">
            <label>Email</label>
            <input type="email" id="email" required>

            <label>Password</label>
            <input type="password" id="password" required minlength="8">

            <button type="submit">Login</button>

            <div id="message-container"></div>
        </form>
    </section>
</main>

<script src="login.js" defer></script>

</body>
</html>
