<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Manage Resources</title>

    <link rel="stylesheet" href="style.css">

    <script src="admin.js" defer></script>
</head>
<body>

    <header>
        <h1>Manage Course Resources</h1>
    </header>

    <main>

        <section>
            <h2>Add a New Resource</h2>

            <form id="resource-form" action="#">
                <fieldset>
                    <legend>Resource Details</legend>

                    <label for="resource-title">Resource Title:</label>
                    <input type="text" id="resource-title" required>

                    <label for="resource-description">Resource Description:</label>
                    <textarea id="resource-description"></textarea>

                    <label for="resource-link">Resource Link:</label>
                    <input type="url" id="resource-link" required>

                    <button id="add-resource" type="submit">Add Resource</button>
                </fieldset>
            </form>
        </section>

        <section>
            <h2>Existing Resources</h2>

            <table id="resources-table" border="1">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Description</th>
                        <th>Link</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody id="resources-tbody">
                    <tr>
                        <td>HTML Basics</td>
                        <td>Introduction to HTML</td>
                        <td><a href="https://example.com">Open Link</a></td>
                        <td>
                            <button class="edit-btn" data-id="1">Edit</button>
                            <button class="delete-btn" data-id="1">Delete</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </section>

    </main>

</body>
</html>
