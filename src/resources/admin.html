<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Resources</title>

    <link rel="stylesheet" href="style.css">

    <script src="admin.js" defer></script>
</head>
<body>

<header>
    <h1>Manage Course Resources</h1>
</header>

<main>

    <!-- Form Section -->
    <section>
        <h2>Add a New Resource</h2>

        <form id="resource-form" action="#">
            <fieldset>
                <legend>Resource Details</legend>

                <label for="resource-title">Title:</label>
                <input type="text" id="resource-title" required>

                <label for="resource-description">Description:</label>
                <textarea id="resource-description"></textarea>

                <label for="resource-link">Link:</label>
                <input type="url" id="resource-link" required>

                <button id="add-resource" type="submit">Add Resource</button>
            </fieldset>
        </form>
    </section>

    <!-- Table Section -->
    <section>
        <h2>Existing Resources</h2>

        <table id="resources-table" border="1">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Description</th>
                    <th>Link</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <!-- مهم جدًا: يكون فاضي -->
            <tbody id="resources-tbody"></tbody>
        </table>
    </section>

</main>

</body>
</html>
